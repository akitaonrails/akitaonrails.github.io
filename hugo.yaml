# Hugo configuration file
# Dev mode: hugo server --renderSegments recent
# Only renders 2025+ content for fast preview (~70 posts instead of ~750)
segments:
  recent:
    includes:
    - kind: '{home,section,taxonomy,term}'
    - path: '{/pt-br/**,/en/**,/about}'

title: 'Blog Nextside'
enableEmoji: true
languageCode: "pt-BR"
defaultContentLanguage: "pt-br"
defaultContentLanguageInSubdir: false
baseURL: 'https://blog.nextside.tech/'

languages:
  pt-br:
    languageCode: pt-BR
    languageName: 'Português'
    weight: 1
    title: 'Blog Nextside'
  en:
    languageCode: en
    languageName: 'English'
    weight: 2
    title: 'Nextside Blog'

outputs:
  home: [HTML, RSS]

services:
  disqus:
    shortname: nextside-blog

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false
    base: "https://github.com/nextside-tech/blog/edit/master/content"

  # Keep default youtube shortcode as configurable
  youtubeDefaults:
    iframeAllowList: "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy: "no-referrer"
    iframeStyle: "border:0; width:100%; aspect-ratio:16/9;"

  theme:
    default: light

  author:
    name: Nextside
    email: contato@nextside.tech

  description: "Blog da Nextside — tecnologia, engenharia de software, produto e carreira."
