# Hugo configuration file
# Dev mode: hugo server --renderSegments recent
# Only renders 2025+ content for fast preview (~70 posts instead of ~750)
segments:
  recent:
    includes:
    - kind: '{home,section,taxonomy,term}'
    - path: '{/2025/**,/2026/**,/2027/**,/about,/archives}'

title: AkitaOnRails.com
enableEmoji: true
languageCode: "pt-BR"
defaultContentLanguage: "pt-br"
baseURL: "https://www.akitaonrails.com/"

languages:
  pt-br:
    languageName: "Português"
    languageCode: "pt-BR"
    weight: 1
    menu:
      main:
        - name: Tema
          weight: 0
          params:
            type: theme-toggle
        - name: Sobre
          pageRef: /about
          weight: 1
        - name: GitHub ↗
          url: "https://github.com/akitaonrails"
          weight: 2
          params:
            icon: github
        - name: Buscar
          weight: 3
          params:
            type: search
        - name: RSS
          weight: 4
          url: "/index.xml"
          params:
            icon: rss
      sidebar:
        - name: GitHub
          weight: 1
          url: "https://github.com/akitaonrails/akitaonrails.github.io"
          params:
            icon: github
        - name: Twitter
          weight: 1
          url: "https://x.com/AkitaOnRails"
          params:
            icon: x-twitter
        - name: The M.Akita Chronicles
          weight: 2
          url: "https://themakitachronicles.com"
          params:
            icon: newspaper
  en:
    languageName: "English"
    languageCode: "en"
    weight: 2
    title: "AkitaOnRails.com"
    contentDir: "content"
    params:
      description: "Fabio Akita's blog — tech, career, and assorted geek topics. English edition."
    menu:
      main:
        - name: Theme
          weight: 0
          params:
            type: theme-toggle
        - name: About
          pageRef: /en/about
          weight: 1
        - name: GitHub ↗
          url: "https://github.com/akitaonrails"
          weight: 2
          params:
            icon: github
        - name: Search
          weight: 3
          params:
            type: search
        - name: RSS
          weight: 4
          url: "/en/index.xml"
          params:
            icon: rss
      sidebar:
        - name: GitHub
          weight: 1
          url: "https://github.com/akitaonrails/akitaonrails.github.io"
          params:
            icon: github
        - name: Twitter
          weight: 1
          url: "https://x.com/AkitaOnRails"
          params:
            icon: x-twitter
        - name: The M.Akita Chronicles
          weight: 2
          url: "https://themakitachronicles.com"
          params:
            icon: newspaper

outputs:
  home: [HTML, RSS]

services:
  disqus:
    shortname: akitaonrails

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"

  # Keep default youtube shortcode as configurable
  youtubeDefaults:
    iframeAllowList: "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy: "no-referrer"
    iframeStyle: "border:0; width:100%; aspect-ratio:16/9;"

  theme:
    default: light

  author:
    name: Fabio Akita
    email: fabioakita@gmail.com

  description: "Blog do Fabio Akita do Canal do YouTube 'Akitando' falando sobre tecnologia, carreira e coisas geek."
