<header class="ns-header">
  <div class="ns-header-inner">
    <a href="{{ "/" | relLangURL }}" class="ns-wordmark" aria-label="Nextside">
      {{- partial "custom/wordmark.html" . -}}
    </a>

    <nav class="ns-nav">
      <a href="{{ "/posts/" | relLangURL }}">{{ i18n "nav_posts" }}</a>
      <a href="{{ "/tags/" | relLangURL }}">{{ i18n "nav_tags" }}</a>
      <a href="{{ "/sobre/" | relLangURL }}">{{ i18n "nav_about" }}</a>
    </nav>

    <div class="ns-header-actions">
      {{- partial "custom/theme-toggle.html" . -}}
      {{- partial "custom/lang-switcher.html" . -}}
      {{- if (site.Params.search.enable | default true) -}}
        <div class="ns-search-wrapper">
          {{- partial "search.html" . -}}
        </div>
      {{- end -}}
    </div>
  </div>
</header>
