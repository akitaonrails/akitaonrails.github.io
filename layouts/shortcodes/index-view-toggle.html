{{- $listLabel := .Get "list" | default "List" -}}
{{- $gridLabel := .Get "grid" | default "Grid" -}}
{{- $groupLabel := .Get "label" | default "Post view" -}}

<div class="aor-index-view-toggle" role="group" aria-label="{{ $groupLabel }}">
  <button type="button" data-index-view-button="list" aria-controls="aor-index-list aor-index-grid" aria-pressed="true" title="{{ $listLabel }}">
    {{- partial "utils/icon.html" (dict "name" "view-list" "attributes" `height="1em" width="1em" aria-hidden="true"`) -}}
    <span>{{ $listLabel }}</span>
  </button>
  <button type="button" data-index-view-button="grid" aria-controls="aor-index-list aor-index-grid" aria-pressed="false" title="{{ $gridLabel }}">
    {{- partial "utils/icon.html" (dict "name" "view-grid" "attributes" `height="1em" width="1em" aria-hidden="true"`) -}}
    <span>{{ $gridLabel }}</span>
  </button>
</div>

<script>
  (function () {
    var root = document.documentElement;
    var key = 'aor-index-view';
    var view = 'list';

    try {
      var saved = window.localStorage.getItem(key);
      if (saved === 'grid' || saved === 'list') view = saved;
    } catch (error) {
      view = 'list';
    }

    root.classList.add('aor-index-enhanced');

    function setView(nextView, persist) {
      view = nextView === 'grid' ? 'grid' : 'list';
      root.setAttribute('data-aor-index-view', view);

      var buttons = document.querySelectorAll('[data-index-view-button]');
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].setAttribute('aria-pressed', buttons[i].getAttribute('data-index-view-button') === view ? 'true' : 'false');
      }

      window.dispatchEvent(new CustomEvent('aor:index-view-change', { detail: { view: view } }));

      if (persist) {
        try {
          window.localStorage.setItem(key, view);
        } catch (error) {
          // The selected view still works when storage is unavailable.
        }
      }
    }

    setView(view, false);

    var toggle = document.querySelector('.aor-index-view-toggle');
    if (!toggle) return;

    toggle.addEventListener('click', function (event) {
      var button = event.target.closest('[data-index-view-button]');
      if (!button || !toggle.contains(button)) return;
      setView(button.getAttribute('data-index-view-button'), true);
    });
  }());
</script>
